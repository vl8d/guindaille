<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>bron - 404</title>
  <link rel="icon" type="image/png" href="https://content.stucom.tech/guindaille/td-tickets/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #f5f5f0;
      --grey: #999;
      --mid: #2a2a2a;
      --line: #2a2a2a;
    }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--black);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      gap: 2rem;
    }

    .logo {
      max-width: 300px;
      width: 100%;
      filter: invert(1) brightness(0.9);
      opacity: 0;
      animation: fadeIn .6s ease forwards;
    }

    .card {
      border: 1px solid var(--line);
      max-width: 440px;
      width: 100%;
      opacity: 0;
      transform: translateY(24px);
      animation: slideUp .55s ease forwards .15s;
    }

    .card-header {
      border-bottom: 1px solid var(--line);
      padding: .6rem 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-header-label {
      font-size: .6rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--grey);
    }

    .card-header-dots { display: flex; gap: .4rem; }
    .dot { width: 7px; height: 7px; border: 1px solid var(--mid); }

    .card-body {
      padding: 2rem 1.8rem 1.6rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .error-code {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 7rem;
      letter-spacing: .06em;
      line-height: 1;
    }

    .error-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: .12em;
    }

    .error-message {
      font-size: .72rem;
      letter-spacing: .04em;
      color: var(--grey);
      line-height: 1.6;
    }

    .divider { border: none; border-top: 1px solid var(--line); }

    .redirect-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .redirect-label {
      font-size: .6rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--grey);
    }

    .countdown-wrap { display: flex; align-items: center; gap: .6rem; }

    .countdown {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: .08em;
      min-width: 1.5rem;
      text-align: right;
    }

    .progress-track {
      width: 80px;
      height: 2px;
      background: var(--mid);
      overflow: hidden;
    }

    /* Animation CSS pure sur 5s — transform-origin left, scaleX 1→0 */
    .progress-bar {
      height: 100%;
      background: var(--white);
      transform-origin: left center;
      animation: shrink 5s linear forwards;
    }

    @keyframes shrink {
      from { transform: scaleX(1); }
      to   { transform: scaleX(0); }
    }

    .btn-row { display: flex; gap: .7rem; flex-wrap: wrap; }

    .btn {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: .12em;
      padding: .65rem 1.4rem;
      border: 1px solid var(--line);
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background .15s, color .15s;
      border-radius: 2px;
    }

    .btn-primary { background: var(--white); color: var(--black); border-color: var(--white); }
    .btn-primary:hover { background: #ddd; }
    .btn-secondary { background: transparent; color: var(--grey); border-color: var(--line); }
    .btn-secondary:hover { border-color: var(--white); color: var(--white); }

    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 480px) {
      .error-code { font-size: 5rem; }
      .btn-row { flex-direction: column; }
      .btn { text-align: center; }
    }
  </style>
</head>
<body>

  <img src="https://content.stucom.tech/guindaille/td-tickets/logo.png" alt="Logo" class="logo">

  <div class="card">
    <div class="card-header">
      <span class="card-header-label">Erreur système</span>
      <div class="card-header-dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>

    <div class="card-body">
      <div class="error-code">404</div>
      <div class="error-title">Page non trouvée</div>
      <p class="error-message">La page que vous recherchez n'existe pas ou a été déplacée.</p>

      <hr class="divider">

      <div class="redirect-row">
        <span class="redirect-label">Redirection automatique</span>
        <div class="countdown-wrap">
          <div class="progress-track">
            <div class="progress-bar" id="progressBar"></div>
          </div>
          <div class="countdown" id="countdown">5</div>
        </div>
      </div>

      <hr class="divider">

      <div class="btn-row">
        <a href="/" class="btn btn-primary" id="btnHome">Accueil</a>
        <button id="btnBack" class="btn btn-secondary">← Page précédente</button>
      </div>
    </div>
  </div>

  <script>
    let timeLeft = 5;
    const countdownEl = document.getElementById('countdown');
    const progressBar = document.getElementById('progressBar');

    const timer = setInterval(() => {
      timeLeft--;
      countdownEl.textContent = timeLeft;
      if (timeLeft <= 0) {
        clearInterval(timer);
        window.location.href = '/';
      }
    }, 1000);

    function cancelTimer() {
      clearInterval(timer);
      // Fige la barre à sa position actuelle
      const transform = getComputedStyle(progressBar).transform;
      progressBar.style.animation = 'none';
      progressBar.style.transform = transform;
    }

    document.getElementById('btnHome').addEventListener('click', cancelTimer);
    document.getElementById('btnBack').addEventListener('click', () => {
      cancelTimer();
      history.back();
    });
  </script>

</body>
</html>
