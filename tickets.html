<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Tickets</title>
  <script src="jspdf.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #f5f5f0;
      --grey: #999;
      --mid: #2a2a2a;
      --line: #2a2a2a;
      --accent: #f5f5f0;
      --accent-inv: #0a0a0a;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--black);
      color: var(--white);
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .6rem 1.5rem;
      border-bottom: 1px solid var(--line);
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: .12em;
      color: var(--white);
    }

    .logo span {
      color: var(--grey);
      font-size: .9rem;
      letter-spacing: .05em;
      margin-left: .8rem;
      font-family: 'DM Mono', monospace;
      font-weight: 400;
    }

    .header-hint {
      font-size: .65rem;
      color: var(--grey);
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    /* ── MAIN GRID ── */
    .app {
      display: grid;
      grid-template-columns: 260px 1fr 180px;
      height: 100%;
      overflow: hidden;
    }

    /* ── PANELS ── */
    .panel {
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel:last-child { border-right: none; }

    .panel-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: .15em;
      color: var(--grey);
      padding: .75rem 1.2rem .5rem;
      border-bottom: 1px solid var(--line);
      text-transform: uppercase;
    }

    .panel-body {
      flex: 1;
      padding: 1rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: .9rem;
      overflow-y: auto;
    }

    /* ── UPLOAD BLOCKS ── */
    .upload-block { display: flex; flex-direction: column; gap: .4rem; }

    .upload-label {
      font-size: .62rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--grey);
    }

    .ratio-tag {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      font-size: .6rem;
      background: var(--mid);
      color: var(--grey);
      border: 1px solid var(--line);
      border-radius: 2px;
      padding: .15rem .5rem;
      width: fit-content;
    }

    .ratio-tag strong { color: var(--white); }

    .file-btn {
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      gap: .6rem;
      background: var(--mid);
      border: 1px solid var(--line);
      border-radius: 3px;
      padding: .55rem .8rem;
      font-family: 'DM Mono', monospace;
      font-size: .72rem;
      color: var(--grey);
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }

    .file-btn:hover { border-color: var(--white); color: var(--white); }
    .file-btn.loaded { border-color: var(--white); color: var(--white); }
    .file-btn.loaded::before { content: "✓ "; color: var(--white); }

    .file-btn input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    /* ── DIVIDER ── */
    .divider {
      border: none;
      border-top: 1px solid var(--line);
      margin: .2rem 0;
    }

    /* ── SLIDERS ── */
    .slider-block { display: flex; flex-direction: column; gap: .3rem; }

    .slider-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: .62rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--grey);
    }

    .slider-val { color: var(--white); min-width: 2.5rem; text-align: right; }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 2px;
      background: var(--line);
      outline: none;
      border-radius: 0;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      background: var(--white);
      border-radius: 0;
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 12px;
      height: 12px;
      background: var(--white);
      border-radius: 0;
      border: none;
      cursor: pointer;
    }

    /* ── CANVAS AREA ── */
    .canvas-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.2rem;
      gap: .8rem;
      background: #111;
      position: relative;
    }

    #canvas {
      max-width: 100%;
      max-height: calc(100vh - 120px);
      object-fit: contain;
      border: 1px solid var(--line);
      display: block;
    }

    .canvas-meta {
      font-size: .6rem;
      color: var(--grey);
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    /* ── RIGHT PANEL (actions) ── */
    .actions-panel {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .action-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-end;
      padding: 1rem 1.1rem .8rem;
      border: none;
      border-bottom: 1px solid var(--line);
      background: var(--black);
      color: var(--white);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.05rem;
      letter-spacing: .12em;
      cursor: pointer;
      text-align: left;
      transition: background .15s;
      position: relative;
    }

    .action-btn:last-child { border-bottom: none; }
    .action-btn:hover { background: var(--mid); }
    .action-btn:disabled { opacity: .3; cursor: not-allowed; }

    .action-btn .badge {
      font-family: 'DM Mono', monospace;
      font-size: .55rem;
      font-weight: 500;
      letter-spacing: .1em;
      color: var(--grey);
      text-transform: uppercase;
      margin-bottom: .3rem;
    }

    .action-btn.primary {
      background: var(--white);
      color: var(--black);
    }

    .action-btn.primary:hover { background: #ddd; }
    .action-btn.primary .badge { color: #666; }

    /* ── PROGRESS ── */
    #progressContainer {
      display: none;
      position: absolute;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      width: 280px;
      background: var(--black);
      border: 1px solid var(--white);
      padding: .8rem 1rem;
      z-index: 10;
    }

    .prog-label {
      font-size: .65rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--grey);
      margin-bottom: .5rem;
    }

    .prog-track {
      height: 2px;
      background: var(--mid);
      width: 100%;
    }

    #progressBar {
      height: 100%;
      width: 0%;
      background: var(--white);
      transition: width .2s;
    }

    #progressText {
      font-size: .6rem;
      color: var(--grey);
      margin-top: .4rem;
      letter-spacing: .06em;
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--black); }
    ::-webkit-scrollbar-thumb { background: var(--mid); }
  </style>
</head>
<body>

<header>
  <div class="logo">Tickets <span>/ générateur PDF</span></div>
  <div class="header-hint">Ratio recommandé — 16:9</div>
</header>

<div class="app">

  <!-- LEFT: uploads + sliders -->
  <div class="panel">
    <div class="panel-title">Fichiers</div>
    <div class="panel-body">

      <div class="upload-block">
        <div class="upload-label">Overlay</div>
        <div class="ratio-tag">16:9 · <strong>ex. 1920×1080</strong></div>
        <label class="file-btn" id="labelOverlay">
          Choisir un fichier
          <input type="file" id="uploadOverlay" accept="image/*">
        </label>
      </div>

      <hr class="divider">

      <div class="upload-block">
        <div class="upload-label">Image de fond</div>
        <div class="ratio-tag">16:9 · <strong>ex. 1920×1080</strong></div>
        <label class="file-btn" id="labelUpload">
          Choisir un fichier
          <input type="file" id="upload" accept="image/*">
        </label>
      </div>

      <hr class="divider">

      <div class="slider-block">
        <div class="slider-row">
          <span>Zoom</span>
          <span class="slider-val" id="valZoom">1.00</span>
        </div>
        <input type="range" id="zoom" min="0.1" max="2" step="0.01" value="1">
      </div>

      <div class="slider-block">
        <div class="slider-row">
          <span>Offset X</span>
          <span class="slider-val" id="valX">0</span>
        </div>
        <input type="range" id="offsetX" min="-500" max="500" step="1" value="0">
      </div>

      <div class="slider-block">
        <div class="slider-row">
          <span>Offset Y</span>
          <span class="slider-val" id="valY">0</span>
        </div>
        <input type="range" id="offsetY" min="-500" max="500" step="1" value="0">
      </div>

    </div>
  </div>

  <!-- CENTER: canvas -->
  <div class="canvas-panel">
    <canvas id="canvas" width="607" height="343"></canvas>
    <div class="canvas-meta" id="canvasMeta">En attente d'une image…</div>

    <div id="progressContainer">
      <div class="prog-label">Génération en cours</div>
      <div class="prog-track"><div id="progressBar"></div></div>
      <div id="progressText">0%</div>
    </div>
  </div>

  <!-- RIGHT: actions -->
  <div class="panel actions-panel">
    <div class="panel-title">Exporter</div>

    <button class="action-btn" id="download">
      <span class="badge">Rendu unique</span>
      Télécharger PNG
    </button>

    <button class="action-btn" id="downloadPDF">
      <span class="badge">Grille 2 colonnes</span>
      Cartes PDF
    </button>

    <button class="action-btn primary" id="downloadPDF50">
      <span class="badge">Grille 5×10 · 50 tickets</span>
      Tickets PDF
    </button>

  </div>

</div>

<script>
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  let overlayImg = null, userImg = null;
  let baseWidth = 607, baseHeight = 343;
  let zoom = 1, offsetX = 0, offsetY = 0;

  function redraw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (userImg) {
      const r = userImg.width / userImg.height;
      let dw = baseWidth * zoom, dh = dw / r;
      if (dh < baseHeight * zoom) { dh = baseHeight * zoom; dw = dh * r; }
      ctx.drawImage(userImg, (baseWidth - dw) / 2 + offsetX, (baseHeight - dh) / 2 + offsetY, dw, dh);
    }
    if (overlayImg) ctx.drawImage(overlayImg, 0, 0, canvas.width, canvas.height);
    document.getElementById("canvasMeta").textContent =
      `${canvas.width} × ${canvas.height} px`;
  }

  document.getElementById("uploadOverlay").addEventListener("change", (e) => {
    const file = e.target.files[0]; if (!file) return;
    const img = new Image();
    img.onload = () => {
      overlayImg = img;
      baseWidth = img.width; baseHeight = img.height;
      canvas.width = baseWidth; canvas.height = baseHeight;
      redraw();
    };
    img.src = URL.createObjectURL(file);
    document.getElementById("labelOverlay").classList.add("loaded");
    document.getElementById("labelOverlay").childNodes[0].textContent = file.name + " ";
  });

  document.getElementById("upload").addEventListener("change", (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => { userImg = img; window.userImg = img; redraw(); };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
    document.getElementById("labelUpload").classList.add("loaded");
    document.getElementById("labelUpload").childNodes[0].textContent = file.name + " ";
  });

  document.getElementById("zoom").addEventListener("input", e => {
    zoom = parseFloat(e.target.value);
    document.getElementById("valZoom").textContent = zoom.toFixed(2);
    redraw();
  });
  document.getElementById("offsetX").addEventListener("input", e => {
    offsetX = parseInt(e.target.value);
    document.getElementById("valX").textContent = offsetX;
    redraw();
  });
  document.getElementById("offsetY").addEventListener("input", e => {
    offsetY = parseInt(e.target.value);
    document.getElementById("valY").textContent = offsetY;
    redraw();
  });

  document.getElementById("download").addEventListener("click", () => {
    const a = document.createElement("a");
    a.download = "rendu.png";
    a.href = canvas.toDataURL("image/png");
    a.click();
  });

  document.getElementById("downloadPDF").addEventListener("click", () => {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF("p", "mm", "a4");
    const imgData = canvas.toDataURL("image/png");
    const cw = 75, ch = 45;
    let x = 10, y = 10, col = 0, row = 0;
    for (let i = 0; i < 10; i++) {
      pdf.addImage(imgData, "PNG", x, y, cw, ch);
      col++;
      if (col === 2) { col = 0; row++; x = 10; y = 10 + row * (ch + 10); }
      else x = 110;
    }
    pdf.save("cartes.pdf");
  });

  document.getElementById("downloadPDF50").addEventListener("click", async () => {
    const { jsPDF } = window.jspdf;
    if (!userImg) { alert("Veuillez d'abord uploader une image de fond."); return; }

    const pCont = document.getElementById("progressContainer");
    const pBar  = document.getElementById("progressBar");
    const pText = document.getElementById("progressText");
    pCont.style.display = "block";

    const btn = document.getElementById("downloadPDF50");
    btn.disabled = true;

    try {
      const pdf = new jsPDF("p", "mm", "a4");
      const cols = 5, rows = 10;
      const mX = 10, mY = 10, gX = 2, gY = 2;
      const cw = (210 - 2*mX - (cols-1)*gX) / cols;
      const ch = (297 - 2*mY - (rows-1)*gY) / rows;

      const off = document.createElement("canvas");
      off.width = canvas.width; off.height = canvas.height;
      const oc = off.getContext("2d");
      if (userImg) {
        const r = userImg.width / userImg.height;
        let dw = off.width * zoom, dh = dw / r;
        if (dh < off.height * zoom) { dh = off.height * zoom; dw = dh * r; }
        oc.drawImage(userImg, (off.width-dw)/2+offsetX, (off.height-dh)/2+offsetY, dw, dh);
      }
      if (overlayImg) oc.drawImage(overlayImg, 0, 0, off.width, off.height);
      const composite = off.toDataURL("image/png");
      const ratio = off.width / off.height;

      let processed = 0;
      const total = rows * cols;

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const xCell = mX + col*(cw+gX);
          const yCell = mY + row*(ch+gY);
          let dw = cw, dh = cw/ratio;
          if (dh > ch) { dh = ch; dw = dh*ratio; }
          const x = xCell + (cw-dw)/2;
          const y = yCell + (ch-dh)/2;
          pdf.addImage(composite, "PNG", x, y, dw, dh);
          processed++;
          const pct = Math.round(processed/total*100);
          pBar.style.width = pct + "%";
          pText.textContent = `${pct}% — ${processed}/${total}`;
          if (processed % 5 === 0) await new Promise(r => setTimeout(r, 10));
        }
      }
      pText.textContent = "Finalisation…";
      await new Promise(r => setTimeout(r, 100));
      pdf.save("tickets-5x10.pdf");
      pText.textContent = "✓ Téléchargé";
      await new Promise(r => setTimeout(r, 1500));
    } catch(err) {
      console.error(err);
      pText.textContent = "❌ Erreur";
      await new Promise(r => setTimeout(r, 2000));
    }
    pCont.style.display = "none";
    btn.disabled = false;
  });
</script>
</body>
</html>
